# SonarCloud Configuration for TypeScript Project
# https://docs.sonarcloud.io/

# Project identification
sonar.projectKey=Deltares_fews-pi-requests
sonar.organization=deltares

# Source code
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test configuration
#sonar.tests=tests,e2e
#sonar.testExecutionReportPaths=test-results/junit.xml

# Coverage reports (Playwright/Istanbul)
#sonar.javascript.lcov.reportPaths=coverage/lcov.info

# File exclusions
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
#sonar.test.exclusions=

# TypeScript/JavaScript specific configuration
#sonar.javascript.file.suffixes=.js,.ts
#sonar.typescript.tsconfigPath=tsconfig.json

# Code coverage settings
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**,**/e2e/**,**/node_modules/**

# Analysis settings
#sonar.verbose=false
#sonar.links.homepage=https://github.com/Deltares/fews-pi-requests
#sonar.links.ci=
#sonar.links.issue=
#sonar.links.scm=https://github.com/Deltares/fews-pi-requests

